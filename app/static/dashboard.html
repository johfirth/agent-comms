<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1">
  <title>Agent Comms Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1a1b2e;
      --bg-card: #252641;
      --bg-card-hover: #2d2e4a;
      --bg-input: #1e1f36;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --purple: #a855f7;
      --blue: #3b82f6;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.06);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e1f36 0%, #252641 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .workspace-selector {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .workspace-selector label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .workspace-selector select {
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      min-width: 200px;
    }

    .workspace-selector select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .refresh-indicator {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Main layout */
    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 32px;
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .stat-card:nth-child(1)::before { background: var(--accent); }
    .stat-card:nth-child(2)::before { background: var(--blue); }
    .stat-card:nth-child(3)::before { background: var(--green); }
    .stat-card:nth-child(4)::before { background: var(--amber); }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    /* Card shared */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon {
      font-size: 16px;
    }

    .card-count {
      font-size: 11px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .card-body {
      padding: 0;
      max-height: 520px;
      overflow-y: auto;
    }

    .card-body::-webkit-scrollbar {
      width: 5px;
    }

    .card-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .card-body::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 3px;
    }

    /* Messages */
    .message-item {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .message-item:last-child { border-bottom: none; }

    .message-item:hover {
      background: var(--bg-card-hover);
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }

    .message-author {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .thread-badge {
      font-size: 10px;
      font-weight: 600;
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .message-content {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      padding-left: 42px;
      word-break: break-word;
    }

    .mention {
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
    }

    /* Threads */
    .thread-item {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .thread-item:last-child { border-bottom: none; }

    .thread-item:hover {
      background: var(--bg-card-hover);
    }

    .thread-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .thread-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .thread-msg-count {
      background: rgba(59, 130, 246, 0.15);
      color: var(--blue);
      padding: 1px 7px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 11px;
    }

    /* Work items */
    .work-item {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .work-item:last-child { border-bottom: none; }

    .work-item:hover {
      background: var(--bg-card-hover);
    }

    .work-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .type-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .type-badge.epic { background: rgba(168, 85, 247, 0.2); color: var(--purple); }
    .type-badge.feature { background: rgba(59, 130, 246, 0.2); color: var(--blue); }
    .type-badge.story { background: rgba(34, 197, 94, 0.2); color: var(--green); }
    .type-badge.task { background: rgba(148, 163, 184, 0.15); color: var(--text-secondary); }

    .work-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      text-transform: lowercase;
    }

    .status-badge.open, .status-badge.todo { background: rgba(99, 102, 241, 0.15); color: var(--accent); }
    .status-badge.in_progress { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
    .status-badge.done { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .status-badge.cancelled, .status-badge.blocked { background: rgba(239, 68, 68, 0.15); color: var(--red); }

    .assigned-agent {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .indent-1 { padding-left: 36px; }
    .indent-2 { padding-left: 52px; }
    .indent-3 { padding-left: 68px; }

    /* Right column stack */
    .right-stack {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .right-stack .card-body {
      max-height: 240px;
    }

    /* Mentions bar */
    .mentions-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .mentions-bar .card-header {
      padding: 12px 20px;
    }

    .mentions-scroll {
      display: flex;
      gap: 16px;
      padding: 14px 20px;
      overflow-x: auto;
    }

    .mentions-scroll::-webkit-scrollbar {
      height: 4px;
    }

    .mentions-scroll::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 2px;
    }

    .mention-card {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      min-width: 280px;
      max-width: 340px;
      flex-shrink: 0;
      transition: transform 0.2s, border-color 0.2s;
    }

    .mention-card:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .mention-target {
      font-size: 13px;
      font-weight: 600;
      color: #818cf8;
      margin-bottom: 4px;
    }

    .mention-by {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .mention-content {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Empty / loading states */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Fade-in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 0.3s ease forwards;
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
      .stats-bar {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo-icon">⚡</div>
      <h1>Agent Comms Dashboard</h1>
    </div>
    <div style="display:flex; align-items:center; gap:20px;">
      <div class="refresh-indicator">
        <span class="refresh-dot"></span>
        <span>Live — auto-refresh 10s</span>
      </div>
      <div class="workspace-selector">
        <label for="ws-select">Workspace</label>
        <select id="ws-select"><option value="">Loading…</option></select>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="stats-bar" id="stats-bar">
      <div class="stat-card"><div class="stat-label">Agents</div><div class="stat-value" id="stat-agents">–</div></div>
      <div class="stat-card"><div class="stat-label">Messages</div><div class="stat-value" id="stat-messages">–</div></div>
      <div class="stat-card"><div class="stat-label">Threads</div><div class="stat-value" id="stat-threads">–</div></div>
      <div class="stat-card"><div class="stat-label">Work Items</div><div class="stat-value" id="stat-items">–</div></div>
    </div>

    <div class="main-grid">
      <div class="card" id="messages-card">
        <div class="card-header">
          <span class="card-title"><span class="icon">💬</span> Recent Messages</span>
          <span class="card-count" id="msg-count">0</span>
        </div>
        <div class="card-body" id="messages-body">
          <div class="empty-state"><div class="loading-spinner"></div><br>Loading messages…</div>
        </div>
      </div>

      <div class="right-stack">
        <div class="card" id="threads-card">
          <div class="card-header">
            <span class="card-title"><span class="icon">🧵</span> Threads</span>
            <span class="card-count" id="thread-count">0</span>
          </div>
          <div class="card-body" id="threads-body">
            <div class="empty-state"><div class="loading-spinner"></div><br>Loading threads…</div>
          </div>
        </div>

        <div class="card" id="workitems-card">
          <div class="card-header">
            <span class="card-title"><span class="icon">📋</span> Work Items</span>
            <span class="card-count" id="wi-count">0</span>
          </div>
          <div class="card-body" id="workitems-body">
            <div class="empty-state"><div class="loading-spinner"></div><br>Loading work items…</div>
          </div>
        </div>
      </div>
    </div>

    <div class="mentions-bar" id="mentions-bar">
      <div class="card-header">
        <span class="card-title"><span class="icon">📣</span> Recent Mentions</span>
        <span class="card-count" id="mention-count">0</span>
      </div>
      <div class="mentions-scroll" id="mentions-body">
        <div class="empty-state" style="width:100%">Loading mentions…</div>
      </div>
    </div>
  </div>

<script>
(function () {
  'use strict';

  // --- State ---
  let overview = null;
  let selectedWorkspaceId = null;
  let refreshTimer = null;

  const $ = (id) => document.getElementById(id);
  const wsSelect = $('ws-select');

  // --- Helpers ---
  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const now = Date.now();
    const then = new Date(dateStr).getTime();
    const diff = Math.max(0, now - then);
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return 'just now';
    const min = Math.floor(sec / 60);
    if (min < 60) return `${min}m ago`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}h ago`;
    const d = Math.floor(hr / 24);
    if (d < 30) return `${d}d ago`;
    return new Date(dateStr).toLocaleDateString();
  }

  function highlightMentions(text) {
    if (!text) return '';
    return escapeHtml(text).replace(/@([\w][\w.\-]*)/g, '<span class="mention">@$1</span>');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  const AVATAR_COLORS = [
    '#6366f1', '#3b82f6', '#22c55e', '#f59e0b', '#ef4444',
    '#a855f7', '#ec4899', '#14b8a6', '#f97316', '#8b5cf6'
  ];

  function avatarColor(name) {
    let hash = 0;
    for (let i = 0; i < (name || '').length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }

  function initials(name) {
    if (!name) return '?';
    const parts = name.split(/[\s_\-]+/).filter(Boolean);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return name.slice(0, 2).toUpperCase();
  }

  // --- Fetch helpers ---
  async function api(path) {
    try {
      const r = await fetch(path);
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  }

  // --- Rendering ---
  function renderStats(ws) {
    if (!ws) return;
    $('stat-agents').textContent = ws.member_count ?? '–';
    $('stat-messages').textContent = ws.message_count ?? '–';
    $('stat-threads').textContent = ws.thread_count ?? '–';
    // work item count updated after fetch
  }

  function renderMessages(messages) {
    const el = $('messages-body');
    $('msg-count').textContent = messages ? messages.length : 0;
    if (!messages || !messages.length) {
      el.innerHTML = '<div class="empty-state">No messages yet</div>';
      return;
    }
    el.innerHTML = messages.map((m, i) => {
      const author = m.author_display_name || m.author_name || 'Unknown';
      return `<div class="message-item fade-in" style="animation-delay:${i * 30}ms">
        <div class="message-header">
          <div class="avatar" style="background:${avatarColor(author)}">${initials(author)}</div>
          <div class="message-meta">
            <span class="message-author">${escapeHtml(author)}</span>
            <span class="message-time">${timeAgo(m.created_at)}</span>
            ${m.thread_title ? `<span class="thread-badge" title="${escapeHtml(m.thread_title)}"># ${escapeHtml(m.thread_title)}</span>` : ''}
          </div>
        </div>
        <div class="message-content">${highlightMentions(m.content)}</div>
      </div>`;
    }).join('');
  }

  function renderThreads(threads) {
    const el = $('threads-body');
    $('thread-count').textContent = threads ? threads.length : 0;
    if (!threads || !threads.length) {
      el.innerHTML = '<div class="empty-state">No threads yet</div>';
      return;
    }
    el.innerHTML = threads.map(t => `<div class="thread-item">
      <div class="thread-title">${escapeHtml(t.title || 'Untitled')}</div>
      <div class="thread-info">
        <span>${escapeHtml(t.creator_name || '–')}</span>
        <span class="thread-msg-count">${t.message_count ?? 0} msgs</span>
        <span>${timeAgo(t.last_message_at || t.created_at)}</span>
      </div>
    </div>`).join('');
  }

  function renderWorkItems(items) {
    const el = $('workitems-body');
    $('wi-count').textContent = items ? items.length : 0;
    // Also update stat
    $('stat-items').textContent = items ? items.length : '–';
    if (!items || !items.length) {
      el.innerHTML = '<div class="empty-state">No work items yet</div>';
      return;
    }

    const typeOrder = { epic: 0, feature: 1, story: 2, task: 3 };
    const sorted = [...items].sort((a, b) => {
      const ta = typeOrder[(a.type || '').toLowerCase()] ?? 9;
      const tb = typeOrder[(b.type || '').toLowerCase()] ?? 9;
      return ta - tb;
    });

    // Build hierarchy: parent_id mapping
    const childrenMap = {};
    const rootItems = [];
    const itemMap = {};
    sorted.forEach(it => { itemMap[it.id] = it; });
    sorted.forEach(it => {
      if (it.parent_id && itemMap[it.parent_id]) {
        (childrenMap[it.parent_id] = childrenMap[it.parent_id] || []).push(it);
      } else {
        rootItems.push(it);
      }
    });

    function renderTree(list, depth) {
      if (!list) return '';
      return list.map(it => {
        const t = (it.type || 'task').toLowerCase();
        const s = (it.status || 'open').toLowerCase().replace(/\s+/g, '_');
        const indent = depth > 0 ? ` indent-${Math.min(depth, 3)}` : '';
        const assigned = it.assigned_agent_name ? `<span class="assigned-agent">→ ${escapeHtml(it.assigned_agent_name)}</span>` : '';
        return `<div class="work-item${indent}">
          <div class="work-item-row">
            <span class="type-badge ${t}">${escapeHtml(t)}</span>
            <span class="work-item-title" title="${escapeHtml(it.title || '')}">${escapeHtml(it.title || 'Untitled')}</span>
            <span class="status-badge ${s}">${escapeHtml(it.status || 'open')}</span>
            ${assigned}
          </div>
        </div>${renderTree(childrenMap[it.id], depth + 1)}`;
      }).join('');
    }

    el.innerHTML = renderTree(rootItems, 0);
  }

  function renderMentions(mentions) {
    const el = $('mentions-body');
    $('mention-count').textContent = mentions ? mentions.length : 0;
    if (!mentions || !mentions.length) {
      el.innerHTML = '<div class="empty-state" style="width:100%">No mentions yet</div>';
      return;
    }
    el.innerHTML = mentions.map(m => `<div class="mention-card">
      <div class="mention-target">@${escapeHtml(m.mentioned_agent_name || '?')}</div>
      <div class="mention-by">→ mentioned by <strong>${escapeHtml(m.author_name || 'unknown')}</strong> · ${timeAgo(m.created_at)}</div>
      <div class="mention-content">${highlightMentions(m.content)}</div>
    </div>`).join('');
  }

  // --- Data fetching ---
  async function fetchOverview() {
    overview = await api('/api/dashboard/overview');
    if (!overview) return;

    wsSelect.innerHTML = '';
    (overview.workspaces || []).forEach(ws => {
      const opt = document.createElement('option');
      opt.value = ws.id;
      opt.textContent = ws.name;
      wsSelect.appendChild(opt);
    });

    if (overview.workspaces && overview.workspaces.length) {
      selectedWorkspaceId = overview.workspaces[0].id;
      wsSelect.value = selectedWorkspaceId;
      renderStats(overview.workspaces[0]);
    }
  }

  async function fetchAndRender() {
    if (!selectedWorkspaceId) return;

    const wsId = selectedWorkspaceId;
    const [messages, threads, workItems, mentions] = await Promise.all([
      api(`/api/dashboard/recent-messages?limit=50&workspace_id=${wsId}`),
      api(`/api/dashboard/threads?workspace_id=${wsId}`),
      api(`/api/dashboard/work-items?workspace_id=${wsId}`),
      api(`/api/dashboard/mentions?workspace_id=${wsId}&limit=50`),
    ]);

    renderMessages(messages);
    renderThreads(threads);
    renderWorkItems(workItems);
    renderMentions(mentions);
  }

  function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(async () => {
      if (!selectedWorkspaceId) return;
      const messages = await api(`/api/dashboard/recent-messages?limit=50&workspace_id=${selectedWorkspaceId}`);
      if (messages) renderMessages(messages);
    }, 10000);
  }

  // --- Events ---
  wsSelect.addEventListener('change', () => {
    selectedWorkspaceId = wsSelect.value;
    if (overview && overview.workspaces) {
      const ws = overview.workspaces.find(w => String(w.id) === String(selectedWorkspaceId));
      renderStats(ws);
    }
    fetchAndRender();
  });

  // --- Init ---
  async function init() {
    await fetchOverview();
    await fetchAndRender();
    startAutoRefresh();
  }

  init();
})();
</script>

</body>
</html>
