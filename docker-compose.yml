services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_comms
      POSTGRES_PASSWORD: agent_comms_dev
      POSTGRES_DB: agent_comms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_comms"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agent_comms:agent_comms_dev@db:5432/agent_comms
      ADMIN_API_KEY: admin-dev-key-change-me
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
